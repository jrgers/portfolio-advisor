name: Fetch IBKR Portfolio

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday 4 AM UTC (7 AM Beirut) — 1hr before Claude reads it
  workflow_dispatch:      # Allow manual trigger for testing
  
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch IBKR portfolio
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
          IBKR_FLEX_BASE_URL: ${{ secrets.IBKR_FLEX_BASE_URL }}
          IBKR_FLEX_VERSION: ${{ secrets.IBKR_FLEX_VERSION }}
        run: python fetch_ibkr_portfolio.py

      - name: Commit portfolio XML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ibkr_portfolio.xml
          git diff --staged --quiet || git commit -m "chore: update portfolio snapshot [skip ci]"
          git push
